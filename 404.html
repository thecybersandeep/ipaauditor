<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="dark light">
    <title>Not Found - IPA Auditor</title>
    <meta name="robots" content="noindex">
    <link rel="icon" type="image/svg+xml" href="icons/icon-192.svg">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,500;9..144,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="src/styles.css">
</head>
<body>
    <main style="min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 20px; text-align: center; position: relative; z-index: 2;">
        <div style="font-family: 'Fraunces', serif; font-weight: 600; font-size: clamp(72px, 14vw, 144px); line-height: 1; letter-spacing: -4px; color: var(--accent-primary);">404</div>
        <h1 style="font-family: 'Fraunces', serif; font-style: italic; font-weight: 500; font-size: clamp(28px, 4vw, 40px); margin: 16px 0 12px; letter-spacing: -1px;">Page not found.</h1>
        <p style="color: var(--text-secondary); max-width: 480px; margin: 0 0 32px; font-size: 16px;">The page you're looking for doesn't exist. Drop an <code style="font-family: 'JetBrains Mono', monospace; padding: 2px 8px; background: var(--accent-subtle); color: var(--accent-primary); border-radius: 6px; font-size: 0.9em;">.ipa</code> on the home page to start an audit.</p>
        <a href="/" class="btn btn-primary">← Back home</a>
    </main>
</body>
</html>
